<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<title>Podstawy Kryptografii</title>
	<meta content="width=device-width, initial-scale=1.0"
		  name="viewport">
	<link href="/css/home.css"
		  rel="stylesheet">
	<link href="/css/style.css"
		  rel="stylesheet">
	<link href="/css/pages.css"
		  rel="stylesheet">
	<link href="/css/forms.css"
		  rel="stylesheet">
</head>
<body>
<div class="page-wrapper">
	<header class="app-header">
		<h1>Podstawy Kryptografii</h1>
		<nav aria-label="Główna nawigacja"
			 class="app-nav">
			<div class="nav-left">
				<button class="nav-button active"
						data-page="home"
						type="button">
					Strona główna
				</button>
				<div class="nav-dropdown auth-only">
					<button class="nav-button dropdown-toggle"
							type="button">
						Aplikacje
					</button>
					<div class="dropdown-menu">
						<button data-page="entropy"
								type="button">Entropia
						</button>
						<button data-page="crc"
								type="button">CRC
						</button>
						<button data-page="permutations"
								type="button">Permutacje
						</button>
						<button data-page="ciphers"
								type="button">Szyfrogramy
						</button>
						<button data-page="rot13"
								type="button">ROT13
						</button>
					</div>
				</div>
			</div>
			<div class="nav-right">
				<button class="nav-button guest-only"
						data-page="login"
						type="button">
					Logowanie
				</button>
				<button class="nav-button guest-only"
						data-page="register"
						type="button">
					Rejestracja
				</button>
				<button class="nav-button auth-only hidden"
						data-page="profile"
						type="button">
					Profil
				</button>
				<button class="nav-button auth-only hidden"
						id="logout-button"
						type="button">
					Wyloguj
				</button>
			</div>
		</nav>
	</header>
	<main class="app-main"
		  id="app">
		<p>Ładowanie widoku...</p>
	</main>
</div>
<!-- Skrypty API / auth -->
<script src="/js/api/authApi.js"></script>
<script src="/js/validators/authValidators.js"></script>
<script src="/js/auth/login.js"></script>
<script src="/js/auth/register.js"></script>
<!-- Skrypty laboratoryjne -->
<script src="/js-lab/entropy/entropy.js"></script>
<script src="/js-lab/crc/crc.js"></script>
<script src="/js-lab/permutations/permutacje.js"></script>
<script src="/js-lab/attacks/cezarCipher.js"></script>
<script src="/js-lab/attacks/transpositionCipher.js"></script>
<script src="/js-lab/attacks/aesCipher.js"></script>
<script src="/js-lab/attacks/rsaCipher.js"></script>
<script src="/js-lab/attacks/cryptograms.js"></script>
<script src="/js-lab/rot13/rot13.js"></script>
<!-- Główna obsługa UI -->
<script src="/js/auth/profile.js"></script>
<script src="/js/ui.js"></script>
</body>
</html>
