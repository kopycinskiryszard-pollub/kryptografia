<section class="page-section">
	<h2>CRC</h2>
	<div class="form-group">
		<label for="crc-data">Ciąg bitów:</label>
		<input id="crc-data"
			   type="text">
	</div>
	<div class="form-group">
		<label for="crc-divisor-length">Długość dzielnika:</label>
		<input id="crc-divisor-length"
			   min="2"
			   type="number">
	</div>
	<button id="generate-crc-divisor"
			type="button">Losuj dzielnik
	</button>
	<div class="form-group">
		<label for="crc-divisor">Dzielnik CRC:</label>
		<input id="crc-divisor"
			   type="text">
	</div>
	<div class="form-group">
		<label for="crc-custom">Własna suma CRC do weryfikacji:</label>
		<input id="crc-custom"
			   type="text">
	</div>
	<button id="calculate-crc"
			type="button">Oblicz CRC
	</button>
	<button id="verify-crc"
			type="button">Zweryfikuj CRC
	</button>
	<div class="results">
		<p>Rozszerzone dane: <span id="crc-extended">-</span></p>
		<p>Suma CRC: <span id="crc-result">-</span></p>
		<p>Ciąg do wysłania: <span id="crc-transmission">-</span></p>
		<p>Weryfikacja: <span id="crc-verification">-</span></p>
	</div>
</section>
