<section class="page-section auth-page">
	<h2>Logowanie</h2>
	<form class="auth-form"
		  id="login-form"
		  novalidate>
		<div class="form-group">
			<label for="login">Nazwa użytkownika lub e-mail</label>
			<input
					autocomplete="username"
					id="login"
					name="login"
					required
					type="text"
			>
		</div>
		<div class="form-group">
			<label for="login-password">Hasło</label>
			<input
					autocomplete="current-password"
					id="login-password"
					name="password"
					required
					type="password"
			>
		</div>
		<button type="submit">Zaloguj</button>
	</form>
	<div aria-live="polite"
		 class="message"
		 id="login-message"></div>
</section>
