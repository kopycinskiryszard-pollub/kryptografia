<section class="page-section">
	<h2>ROT13</h2>
	<div class="app-box">
		<div class="app-section">
			<h3>Transformacja tekstu</h3>
			<div class="form-group">
				<label for="rot13-text">Tekst wejściowy:</label>
				<textarea id="rot13-text"
						  placeholder="Wpisz tekst do transformacji ROT13..."></textarea>
			</div>
			<div class="button-row">
				<button id="rot13-transform"
						type="button">Wykonaj ROT13
				</button>
				<button id="rot13-copy-result"
						type="button">Kopiuj wynik
				</button>
				<button id="rot13-clear"
						type="button">Wyczyść
				</button>
			</div>
			<div class="result-box">
				<p>Wynik ROT13: <strong id="rot13-result">-</strong></p>
				<p>Ponowny ROT13: <strong id="rot13-decoded-result">-</strong></p>
			</div>
		</div>
		<div class="app-section">
			<h3>Obsługa pliku .txt</h3>
			<div class="form-group">
				<label for="rot13-file">Wybierz plik tekstowy:</label>
				<input accept=".txt,text/plain"
					   id="rot13-file"
					   type="file">
			</div>
			<div class="button-row">
				<button id="rot13-load-file"
						type="button">Wczytaj plik i wykonaj ROT13
				</button>
				<button id="rot13-download-result"
						type="button">Pobierz wynik jako plik
				</button>
			</div>
			<p class="message message-info"
			   id="rot13-file-info">
				Nie wybrano pliku.
			</p>
		</div>
	</div>
</section>
